<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
<style>.Div {
    display: flex;
    gap: 10px;
    padding: 10px;
    background-color: #f0f0f0;
    border-radius: 6px;
}</style>
</head>
<body>

</body>

<script >
    TaskFiveCurrent = JSON.parse(localStorage.getItem("data"))|| [];

    if(TaskFiveCurrent === null || TaskFiveCurrent === undefined){
        console.log("ups");}
    else{
        for ( let count of TaskFiveCurrent) {
            let div = document.createElement("div");
            div.className = "Div";
            for (const countElement of Object.values(count)) {
                let p = document.createElement("p");
                p.classList.add('my-class');
                p.innerText = countElement.toString();
                div.appendChild(p);
            }
            document.body.appendChild(div);}

    }
</script>
</html>
